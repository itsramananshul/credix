# .github/workflows/preview.yml
#
# Runs on every pull request:
#   1. Type-checks the TypeScript
#   2. Lints with ESLint
#   3. Vercel creates a preview deployment automatically (no extra config needed
#      once you've linked the repo in the Vercel dashboard)

name: Preview Check

on:
  pull_request:
    branches: [main]

jobs:
  typecheck-and-lint:
    name: Type-check & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint
